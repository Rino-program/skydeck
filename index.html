<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyDeck — Bluesky Client</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div id="login-screen" class="login-screen">
  <div class="login-bg">
    <div class="login-blob b1"></div>
    <div class="login-blob b2"></div>
    <div class="login-blob b3"></div>
  </div>
  <div class="login-card">
    <div class="login-logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="20" fill="#0085ff"/>
        <path d="M12 15.5C14.5 11 18 9 20 9C22 9 25.5 11 28 15.5C30 19 30 25 28 27.5C26.5 29.5 23.5 31 20 31C16.5 31 13.5 29.5 12 27.5C10 25 10 19 12 15.5Z" fill="white" opacity="0.9"/>
        <path d="M20 13C18.5 15.5 17 19 17 22C17 25 18.5 28 20 28C21.5 28 23 25 23 22C23 19 21.5 15.5 20 13Z" fill="#0085ff"/>
      </svg>
      <span class="login-brand">SkyDeck</span>
    </div>
    <h1 class="login-title">Blueskyへようこそ</h1>
    <p class="login-subtitle">アカウントに接続してください</p>

    <div class="form-group">
      <label class="form-label">ハンドル</label>
      <div class="input-wrap">
        <span class="input-prefix">@</span>
        <input type="text" id="login-handle" class="form-input" placeholder="yourname.bsky.social" autocomplete="username" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">
        アプリパスワード
        <a href="https://bsky.app/settings/app-passwords" target="_blank" class="label-link">取得方法 ↗</a>
      </label>
      <input type="password" id="login-password" class="form-input" placeholder="xxxx-xxxx-xxxx-xxxx" autocomplete="current-password" />
    </div>

    <div id="login-error" class="login-error hidden"></div>

    <button id="login-btn" class="btn-primary login-btn">
      <span class="btn-text">ログイン</span>
      <span class="btn-spinner hidden">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="40" stroke-dashoffset="20" class="spin-circle"/></svg>
      </span>
    </button>

    <p class="login-note">
      ⚠️ アプリパスワードはブラウザのlocalStorageに保存されます。<br />
      共用PCでの使用は避けてください。
    </p>
  </div>
</div>

<!-- ===== MAIN APP ===== -->
<div id="app" class="app hidden">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="20" fill="#0085ff"/>
        <path d="M12 15.5C14.5 11 18 9 20 9C22 9 25.5 11 28 15.5C30 19 30 25 28 27.5C26.5 29.5 23.5 31 20 31C16.5 31 13.5 29.5 12 27.5C10 25 10 19 12 15.5Z" fill="white" opacity="0.9"/>
        <path d="M20 13C18.5 15.5 17 19 17 22C17 25 18.5 28 20 28C21.5 28 23 25 23 22C23 19 15.5 15.5 20 13Z" fill="#0085ff"/>
      </svg>
      <span>SkyDeck</span>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" data-tab="home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>ホーム</span>
      </button>
      <button class="nav-item" data-tab="notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span>通知</span>
        <span id="notif-badge" class="badge hidden">0</span>
      </button>
      <button class="nav-item" data-tab="my-posts">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span>自分の投稿</span>
      </button>
      <button class="nav-item" data-tab="following">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>フォロー中</span>
      </button>
    </nav>

    <div class="sidebar-bottom">
      <div class="user-chip" id="user-chip">
        <img id="user-avatar" class="user-chip-avatar" src="" alt="" />
        <div class="user-chip-info">
          <span id="user-displayname" class="user-chip-name">—</span>
          <span id="user-handle" class="user-chip-handle">@—</span>
        </div>
      </div>
      <button id="logout-btn" class="logout-btn" title="ログアウト">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="main-content">

    <!-- Compose area -->
    <section class="compose-area" id="compose-area">
      <div class="compose-header">
        <img id="compose-avatar" class="compose-avatar" src="" alt="" />
        <div class="compose-body">
          <textarea
            id="compose-text"
            class="compose-textarea"
            placeholder="今何を考えていますか？"
            maxlength="300"
            rows="3"
          ></textarea>

          <!-- Reply context -->
          <div id="reply-context" class="reply-context hidden">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
            <span id="reply-to-text">返信先: </span>
            <button id="cancel-reply-btn" class="cancel-reply">✕</button>
          </div>

          <!-- Image preview -->
          <div id="image-preview-area" class="image-preview-area hidden"></div>

          <div class="compose-footer">
            <div class="compose-tools">
              <label class="tool-btn" title="画像を追加">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><polyline points="21 15 16 10 5 21"/></svg>
                <input type="file" id="image-input" accept="image/*" multiple style="display:none" />
              </label>
            </div>
            <div class="compose-right">
              <span id="char-count" class="char-count">300</span>
              <button id="post-btn" class="btn-post">
                <span class="btn-text">投稿する</span>
                <span class="btn-spinner hidden"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="40" stroke-dashoffset="20" class="spin-circle"/></svg></span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Tab content -->
    <div class="tabs-container">

      <!-- Home timeline -->
      <section id="tab-home" class="tab-section active">
        <div class="section-header">
          <h2 class="section-title">ホームタイムライン</h2>
          <button class="refresh-btn" data-target="home">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
        <div id="home-feed" class="feed"></div>
      </section>

      <!-- Notifications -->
      <section id="tab-notifications" class="tab-section hidden">
        <div class="section-header">
          <h2 class="section-title">通知</h2>
          <button class="refresh-btn" data-target="notifications">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
        <div id="notifications-feed" class="feed"></div>
      </section>

      <!-- My posts -->
      <section id="tab-my-posts" class="tab-section hidden">
        <div class="section-header">
          <h2 class="section-title">自分の投稿</h2>
          <button class="refresh-btn" data-target="my-posts">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
        <div id="myposts-feed" class="feed"></div>
      </section>

      <!-- Following -->
      <section id="tab-following" class="tab-section hidden">
        <div class="section-header">
          <h2 class="section-title">フォロー中のユーザー</h2>
          <button class="refresh-btn" data-target="following">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
        <div id="following-feed" class="feed"></div>
      </section>

    </div>
  </main>
</div>

<!-- Toast notifications -->
<div id="toast-container" class="toast-container"></div>

<!-- Delete confirm modal -->
<div id="delete-modal" class="modal-overlay hidden">
  <div class="modal-card">
    <h3 class="modal-title">投稿を削除しますか？</h3>
    <p class="modal-body">この操作は取り消せません。</p>
    <div class="modal-actions">
      <button id="delete-cancel-btn" class="btn-modal-cancel">キャンセル</button>
      <button id="delete-confirm-btn" class="btn-modal-danger">削除する</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
